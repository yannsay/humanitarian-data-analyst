# Step 1 framework routing index - humanitarian-data-analyst skill
# Compact surface for routing analyst questions to ontology nodes.
# Match the question against gist + synonyms, then open the file for the full
# description, example_questions, and distinguish_from before committing.
# 66 nodes across 5 axes. Generated from source drafts in 09_full_layer_a_implementation/ - do not hand-edit.

axes:
  sectors: The 11 humanitarian sectors (WASH, Protection, Health, Education, Food Security, Shelter, Livelihoods,
    Nutrition, Logistics, Agriculture, Cross). Answers 'what domain of need?'
  pillars_1d: Pillars 1D describe the TYPE OF INFORMATION (Context, Shock/Event, Displacement, Casualties,
    Humanitarian Access, Information And Communication). Orthogonal to the 2D axis.
  subpillars_1d: Children of the 1D pillars — finer-grained 'type of information' categories.
  pillars_2d: 'Pillars 2D describe the ANALYTICAL LENS (Humanitarian Conditions, At Risk, Capacities &
    Response, Impact, Priority Interventions/Needs). Orthogonal to 1D: an excerpt can carry both a 1D
    and a 2D tag.'
  subpillars_2d: Children of the 2D pillars. Most sibling confusion lives here; consult distinguish_from
    before committing.
