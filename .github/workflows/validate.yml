name: validate-skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Validate Agent Skill format
        # skills-ref is the agentskills.io reference validator.
        # See https://github.com/agentskills/agentskills/tree/main/skills-ref
        run: |
          if command -v skills-ref >/dev/null 2>&1; then
            skills-ref validate .
          else
            echo "skills-ref not installed; skipping format validation."
            echo "Install from https://github.com/agentskills/agentskills to enable."
          fi

      - name: Check ontology integrity
        run: python3 scripts/check_ontology.py
