name: validate-skill

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      # Check out into a directory whose name matches the skill `name`.
      # skills-ref validates that the directory basename == frontmatter name,
      # and `validate .` would resolve to an empty basename and fail.
      - uses: actions/checkout@v4
        with:
          path: humanitarian-data-analyst

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install skills-ref validator
        # skills-ref is the agentskills.io reference validator (no PyPI package;
        # installed editable from the agentskills monorepo subdirectory).
        # https://github.com/agentskills/agentskills/tree/main/skills-ref
        run: |
          git clone --depth 1 https://github.com/agentskills/agentskills.git /tmp/agentskills
          pip install -e /tmp/agentskills/skills-ref

      - name: Validate Agent Skill format
        # validate by the skill's directory name (not `.`)
        run: skills-ref validate humanitarian-data-analyst
