# Layer B Catalog — Top-Level Retrieval Index
# Version: 2026-05-20
# Purpose: LLM-facing index of all 41 indicators. Each entry lists id, label, cluster,
#          layer_a_anchor, and known synonyms. Use this file to route an indicator query
#          to the correct full entry in the cluster YAML file.
#
# Cluster YAML files:
#   catalog/food_security.yaml  — 9 indicators (food security)
#   catalog/wash.yaml           — 17 indicators (WASH)
#   catalog/cccm.yaml           — 15 indicators (CCCM / shelter)
#
# Index structure per entry:
#   id:              Canonical identifier matching the cluster YAML entry
#   label:           Primary human-readable name
#   cluster:         yaml file (food_security | wash | cccm)
#   layer_a_anchor:  Sectors, pillars, and subpillars for cross-layer routing
#   synonyms:        Common alternative names or abbreviations for retrieval
#   priority:        true = one of the four priority indicators with ≥4 impl errors
# ─────────────────────────────────────────────────────────────────────────────

